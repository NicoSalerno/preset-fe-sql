<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="col-lg-4 col-md-8 col-12 border rounded p-4 shadow-sm">
    <form (ngSubmit)="login()" [formGroup]="loginForm">

      <div class="mb-4">
        <label class="form-label">Username</label>
        <input type="email" class="form-control" formControlName="username" />
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          formControlName="password"
        />
      </div>

      <div class="text-danger mb-3" *ngIf="loginError">
        {{ loginError }}
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary w-100">
          Sign in
        </button>
      </div>

    </form>

    <div class="text-center mt-3">
      <a (click)="goToRegister()">Not registered? Do it now</a>
    </div>
  </div>
</div>
