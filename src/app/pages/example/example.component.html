<app-nav-bar></app-nav-bar>
<div *ngIf="user$ | async as user" class="container py-4">
  <h1 class="mb-3">Materiale di esempio</h1>
  <h2>Card</h2>
  <div class="row">
    <div class="col-md-3 col-sm-6" *ngFor="let entity of entity$ | async">
      <app-default-card
        [user]="user"
        [default]="entity"
        (delete)="delete($event)"
        (edit)="openModal(entity)">
      </app-default-card>
    </div>
  </div>
  <h2>Table</h2>
  <app-default-table
    [user]="user"
    [entities]="(entity$ | async) ?? []"
    (delete)="delete($event)"
    (edit)="openModal($event)"
  ></app-default-table>
</div>
