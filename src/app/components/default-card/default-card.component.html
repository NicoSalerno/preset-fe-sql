<div class="card request-card h-100 shadow-sm border-0"
     style="cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;"
     (click)="openDetail()">
  
  <div class="card-header bg-white d-flex justify-content-between align-items-center py-3 px-4">
    <div>
      <h6 class="mb-0 fw-bold">Richiesta #{{ default.id }}</h6>
      <small class="text-muted">
        <i class="bi bi-person-circle me-1"></i>{{ default.Nome }} {{ default.Cognome }}
      </small>
    </div>
  </div>


  <div class="card-body px-4 py-3">
    <div class="row mb-3">
      <div class="col-6">
        <small class="text-muted text-uppercase fw-semibold">Spesa del</small>
        <p class="mb-0"><i class="bi bi-calendar-check me-1"></i>{{ default.DataSpesa | date:'dd/MM/yyyy' }}</p>
      </div>
    </div>

    <div class="mb-3">
      <small class="text-muted text-uppercase fw-semibold">Descrizione</small>
      <p class="card-text text-muted mb-0">{{ default.Descrizione }}</p>
    </div>
  </div>
</div>
