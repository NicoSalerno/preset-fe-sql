<div class="p-3">
  <div class="modal-header">
    <h2 class="modal-title">{{ entity ? 'Modifica' : 'Crea nuova/o' }}</h2>
    <button type="button" class="btn-close" (click)="dismissModal()"></button>
  </div>

  <form [formGroup]="defaultForm">
    <div class="mb-4">
      <label class="form-label">*Descrizione:</label>
      <input type="text" class="form-control" formControlName="descrizione" />
      <div *ngIf="defaultForm.get('descrizione')?.invalid && defaultForm.get('descrizione')?.touched" class="text-danger small">
        obbligatoria.
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">*Categoria:</label>
      <select class="form-select" formControlName="categoria">
        <option value="">Seleziona categoria</option>
        <option *ngFor="let categorie of categories" [value]="categorie.CategoriaID">
          {{ categorie.Nome }}
        </option>
      </select>
      <div *ngIf="defaultForm.get('categoria')?.invalid && defaultForm.get('categoria')?.touched" class="text-danger small">
        obbligatoria.
      </div>
    </div>

    <div class="d-grid">
      <button 
        type="submit" 
        class="btn btn-primary" 
        (click)="closeModal()"
        [disabled]="!defaultForm.valid"
      >{{ entity ? 'Modifica' : 'Crea' }}</button>
    </div>
  </form>
</div>
